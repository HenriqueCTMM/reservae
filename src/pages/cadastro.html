<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reservaê | Cadastro</title>
    <link rel="icon" href="../assets/logo-reservae.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/app.css" />
</head>

<body class="app-surface flex min-h-screen flex-col text-slate-900">
    <a href="#conteudo-principal"
        class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-50 focus:rounded-xl focus:bg-white focus:px-4 focus:py-3 focus:text-sm focus:font-semibold focus:text-slate-900 focus:shadow-lg focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900">Pular
        para o conteúdo principal</a>

    <main id="conteudo-principal" tabindex="-1" class="app-container flex flex-1 items-center justify-center py-8 sm:py-10"
        aria-labelledby="register-title">
        <section class="app-auth-card app-card w-full max-w-md rounded-2xl bg-white p-6 shadow-lg sm:p-8" aria-labelledby="register-title">
            <div class="mb-8 text-center">
                <h1 id="register-title" class="text-3xl font-bold">Criar conta</h1>
                <p class="mt-2 text-sm text-slate-500">Cadastre-se como cliente para reservar mesas</p>
            </div>

            <form id="registerForm" class="space-y-4" aria-labelledby="register-title">
                <div>
                    <label for="nome" class="mb-1 block text-sm font-medium">Nome</label>
                    <input id="nome" name="nome" type="text"
                        class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
                        placeholder="Digite seu nome" required />
                </div>

                <div>
                    <label for="email" class="mb-1 block text-sm font-medium">E-mail</label>
                    <input id="email" name="email" type="email"
                        class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
                        placeholder="Digite seu e-mail" required />
                </div>

                <div>
                    <label for="senha" class="mb-1 block text-sm font-medium">Senha</label>
                    <input id="senha" name="senha" type="password" minlength="6"
                        class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
                        placeholder="Mínimo de 6 caracteres" required />
                </div>

                <button type="submit"
                    class="w-full rounded-xl bg-slate-900 px-4 py-3 font-semibold text-white transition hover:bg-slate-700 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900">Cadastrar</button>
            </form>

            <div id="registerMessage" class="mt-4 hidden rounded-xl px-4 py-3 text-sm"></div>

            <p class="mt-6 text-center text-sm text-slate-600">
                Já tem conta?
                <a href="../index.html"
                    class="font-semibold text-slate-900 underline-offset-4 hover:underline focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900">Voltar
                    para o login</a>
            </p>
        </section>
    </main>

    <footer class="flex items-center justify-center border-t border-slate-200 bg-white px-4 py-4">
        <img src="../assets/logo-reservae.png" alt="Reservaê" class="h-8 w-auto" />
    </footer>

    <script type="module" src="../js/cadastro.js"></script>
</body>

</html>
