<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reservaê | Login</title>
    <link rel="icon" href="./assets/logo-reservae.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/app.css" />
</head>

<body class="app-surface flex min-h-screen flex-col text-slate-900">
    <a href="#conteudo-principal"
        class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-50 focus:rounded-xl focus:bg-white focus:px-4 focus:py-3 focus:text-sm focus:font-semibold focus:text-slate-900 focus:shadow-lg focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900">Pular
        para o conteúdo principal</a>

    <main id="conteudo-principal" tabindex="-1"
        class="app-container flex flex-1 items-center justify-center py-8 sm:py-10" aria-labelledby="login-title">
        <section class="app-auth-card app-card w-full max-w-md rounded-2xl bg-white p-6 shadow-lg sm:p-8"
            aria-labelledby="login-title">
            <div class="mb-8 text-center">
                <h1 id="login-title" class="sr-only">Reservaê</h1>
                <img src="./assets/logo-reservae.png" alt="Reservaê" class="mx-auto h-16 w-auto" />
                <img src="./assets/logo-bistro.jpeg" alt="Dona Maragô Bistrô - Crepes e Pizzas"
                    class="mx-auto mt-4 h-36 w-36 rounded-lg object-cover shadow-sm" />
            </div>

            <form id="loginForm" class="space-y-4" aria-labelledby="login-title">
                <div>
                    <label for="email" class="mb-1 block text-sm font-medium">E-mail</label>
                    <input id="email" name="email" type="email" autocomplete="email"
                        class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
                        placeholder="Digite seu e-mail" required />
                </div>

                <div>
                    <label for="senha" class="mb-1 block text-sm font-medium">Senha</label>
                    <input id="senha" name="senha" type="password" autocomplete="current-password"
                        class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
                        placeholder="Digite sua senha" required />
                </div>

                <button type="submit"
                    class="w-full rounded-xl bg-slate-900 px-4 py-3 font-semibold text-white transition hover:bg-slate-700 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900">Entrar</button>
            </form>

            <div class="my-5 flex items-center gap-3 text-xs font-semibold uppercase tracking-wide text-slate-400">
                <span class="h-px flex-1 bg-slate-200"></span>
                ou
                <span class="h-px flex-1 bg-slate-200"></span>
            </div>

            <button id="googleLoginButton" type="button"
                class="flex w-full items-center justify-center gap-3 rounded-xl border border-slate-300 bg-white px-4 py-3 font-semibold text-slate-900 transition hover:bg-slate-100 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900">
                <svg aria-hidden="true" class="h-5 w-5" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z" />
                </svg>
                <span>Entrar com Google</span>
            </button>

            <div id="loginMessage" class="mt-4 hidden rounded-xl px-4 py-3 text-sm" aria-live="assertive"
                aria-atomic="true"></div>

            <p class="mt-6 text-center text-sm text-slate-600">
                Ainda não tem conta?
                <a href="./pages/cadastro.html"
                    class="font-semibold text-slate-900 underline-offset-4 hover:underline focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900">Criar
                    conta de cliente</a>
            </p>

        </section>
    </main>

    <footer class="border-t border-slate-200 bg-white">
        <div class="app-container grid gap-4 py-5 text-sm text-slate-600 md:grid-cols-[auto_1fr_auto] md:items-center">
            <div class="flex items-center gap-3">
                <img src="./assets/logo-reservae.png" alt="Reservaê" class="h-8 w-auto" />
                <img src="./assets/logo-bistro.jpeg" alt="Dona Maragô Bistrô"
                    class="h-10 w-10 rounded-md object-cover" />
            </div>
            <div>
                <p class="font-semibold text-slate-900">Dona Maragô Bistrô</p>
                <p>Reservas online para crepes, pizzas e momentos especiais.</p>
            </div>
            <div class="md:text-right">
                <p class="font-medium text-slate-700">Atendimento conforme funcionamento do restaurante.</p>
                <p>Gerencie reservas com praticidade e segurança.</p>
            </div>
        </div>
    </footer>

    <script type="module" src="./app.js"></script>
</body>

</html>
