<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reservae | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-100 text-slate-900">
    <a href="#conteudo-principal"
        class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-50 focus:rounded-xl focus:bg-white focus:px-4 focus:py-3 focus:text-sm focus:font-semibold focus:text-slate-900 focus:shadow-lg focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900">Pular
        para o conteúdo principal</a>

    <main id="conteudo-principal" tabindex="-1" class="flex min-h-screen items-center justify-center px-4 py-10"
        aria-labelledby="login-title">
        <section class="w-full max-w-md rounded-2xl bg-white p-8 shadow-lg" aria-labelledby="login-title">
            <div class="mb-8 text-center">
                <h1 id="login-title" class="text-3xl font-bold">Reservae</h1>
                <p class="mt-2 text-sm text-slate-500">Acesse como administrador ou cliente</p>
            </div>

            <form id="loginForm" class="space-y-4" aria-labelledby="login-title">
                <div>
                    <label for="email" class="mb-1 block text-sm font-medium">E-mail</label>
                    <input id="email" name="email" type="email"
                        class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
                        placeholder="Digite seu e-mail" required />
                </div>

                <div>
                    <label for="senha" class="mb-1 block text-sm font-medium">Senha</label>
                    <input id="senha" name="senha" type="password"
                        class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
                        placeholder="Digite sua senha" required />
                </div>

                <button type="submit"
                    class="w-full rounded-xl bg-slate-900 px-4 py-3 font-semibold text-white transition hover:bg-slate-700 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900">Entrar</button>
            </form>

            <div id="loginMessage" class="mt-4 hidden rounded-xl px-4 py-3 text-sm"></div>

            <aside class="mt-8 rounded-2xl bg-slate-50 p-4 text-sm text-slate-600" aria-labelledby="test-users-title">
                <p id="test-users-title" class="font-semibold text-slate-800">Usuários de teste</p>
                <div class="mt-3 space-y-2">
                    <div>
                        <p><strong>Admin:</strong> admin@restaurante.com</p>
                        <p><strong>Senha:</strong> 123456</p>
                    </div>
                    <div>
                        <p><strong>Cliente:</strong> cliente@restaurante.com</p>
                        <p><strong>Senha:</strong> 123456</p>
                    </div>
                </div>
            </aside>
        </section>
    </main>

    <script type="module" src="./app.js"></script>
</body>

</html>
