<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurante | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-100 text-slate-900">
    <main class="flex min-h-screen items-center justify-center px-4 py-10">
        <section class="w-full max-w-md rounded-2xl bg-white p-8 shadow-lg">
            <div class="mb-8 text-center">
                <h1 class="text-3xl font-bold">Reserva Restaurante</h1>
                <p class="mt-2 text-sm text-slate-500">Acesse como administrador ou cliente</p>
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label for="email" class="mb-1 block text-sm font-medium">E-mail</label>
                    <input id="email" name="email" type="email"
                        class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900"
                        placeholder="Digite seu e-mail" required />
                </div>

                <div>
                    <label for="senha" class="mb-1 block text-sm font-medium">Senha</label>
                    <input id="senha" name="senha" type="password"
                        class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none transition focus:border-slate-900"
                        placeholder="Digite sua senha" required />
                </div>

                <button type="submit"
                    class="w-full rounded-xl bg-slate-900 px-4 py-3 font-semibold text-white transition hover:bg-slate-700">Entrar</button>
            </form>

            <div id="loginMessage" class="mt-4 hidden rounded-xl px-4 py-3 text-sm"></div>

            <div class="mt-8 rounded-2xl bg-slate-50 p-4 text-sm text-slate-600">
                <p class="font-semibold text-slate-800">Usuários de teste</p>
                <div class="mt-3 space-y-2">
                    <div>
                        <p><strong>Admin:</strong> admin@restaurante.com</p>
                        <p><strong>Senha:</strong> 123456</p>
                    </div>
                    <div>
                        <p><strong>Cliente:</strong> cliente@restaurante.com</p>
                        <p><strong>Senha:</strong> 123456</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="./app.js"></script>
</body>

</html>
